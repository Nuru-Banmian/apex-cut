<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoCut Agent — AI 视频内容分析与剪辑</title>
<style>
  :root {
    --bg: #0f0f14;
    --card: #1a1a24;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --dim: #8888a0;
    --accent: #6c5ce7;
    --accent-hover: #7d6ff0;
    --success: #00cec9;
    --danger: #e17055;
    --warn: #fdcb6e;
    --radius: 12px;
    --tag-bg: rgba(108,92,231,0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .container { max-width: 780px; margin: 0 auto; padding: 32px 20px 80px; }

  /* Header */
  .header { text-align: center; margin-bottom: 40px; }
  .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .header h1 span { color: var(--accent); }
  .header p { color: var(--dim); margin-top: 6px; font-size: 14px; }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 15px; font-weight: 600;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title .icon { font-size: 18px; }
  .card-title .badge {
    font-size: 10px; background: var(--accent); color: #fff;
    padding: 2px 8px; border-radius: 20px; font-weight: 500;
  }

  /* Form */
  label { display: block; font-size: 13px; color: var(--dim); margin-bottom: 6px; }
  input, textarea, select {
    width: 100%; padding: 10px 14px;
    background: #12121a; border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px;
    outline: none; transition: border-color .2s;
    font-family: inherit;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }

  /* Password toggle */
  .pw-wrap { position: relative; }
  .pw-wrap .toggle {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--dim); cursor: pointer; font-size: 13px;
  }
  .pw-wrap .toggle:hover { color: var(--text); }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 36px; text-align: center; cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent); background: rgba(108,92,231,.05);
  }
  .upload-zone .icon { font-size: 36px; margin-bottom: 8px; }
  .upload-zone p { color: var(--dim); font-size: 14px; }
  .upload-zone .file-name { color: var(--success); font-weight: 600; margin-top: 6px; }
  #file-input { display: none; }

  /* Quick presets */
  .presets { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .preset {
    font-size: 12px; padding: 5px 12px;
    background: #12121a; border: 1px solid var(--border);
    border-radius: 20px; color: var(--dim); cursor: pointer;
    transition: all .2s;
  }
  .preset:hover { border-color: var(--accent); color: var(--text); }

  /* Button */
  .btn {
    width: 100%; padding: 12px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background .2s; margin-top: 8px;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Progress */
  .progress-steps { display: flex; gap: 4px; margin-bottom: 12px; }
  .step {
    flex: 1; height: 4px; background: var(--border); border-radius: 2px;
    transition: background .3s;
  }
  .step.active { background: var(--accent); }
  .step.done { background: var(--success); }
  .step.error { background: var(--danger); }

  .status-line {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px;
  }
  .status-line .status { color: var(--accent); font-weight: 500; }
  .status-line .round { color: var(--dim); }

  /* ====== Analysis Results ====== */
  .analysis-stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    margin-bottom: 20px;
  }
  .stat-item {
    text-align: center; padding: 12px 8px;
    background: #12121a; border-radius: 8px;
  }
  .stat-item .stat-num { font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat-item .stat-label { font-size: 11px; color: var(--dim); margin-top: 4px; }

  .summary-block {
    padding: 14px 18px; background: rgba(108,92,231,.08);
    border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0;
    margin-bottom: 18px; line-height: 1.6; font-size: 14px;
  }
  .summary-block .label { font-size: 11px; color: var(--dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }

  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
  .tag {
    font-size: 12px; padding: 4px 12px;
    background: var(--tag-bg); color: var(--accent);
    border-radius: 20px; font-weight: 500;
  }
  .mood-badge {
    display: inline-block; font-size: 13px; padding: 5px 14px;
    background: rgba(0,206,201,.12); color: var(--success);
    border-radius: 20px; font-weight: 600; margin-bottom: 18px;
  }

  /* Narrative Structure */
  .narrative { margin-bottom: 18px; }
  .narrative h4 { font-size: 13px; color: var(--dim); margin-bottom: 10px; }
  .narr-bar {
    display: flex; height: 28px; border-radius: 6px; overflow: hidden;
    margin-bottom: 10px;
  }
  .narr-seg {
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; color: #fff;
    transition: opacity .2s;
  }
  .narr-seg:hover { opacity: 0.85; }
  .narr-intro { background: #0984e3; }
  .narr-body { background: #6c5ce7; }
  .narr-climax { background: #e17055; }
  .narr-outro { background: #00b894; }
  .narr-other { background: #636e72; }
  .narr-legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 11px; color: var(--dim); }
  .narr-legend span { display: flex; align-items: center; gap: 4px; }
  .narr-legend .dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }

  /* Highlights */
  .highlight-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 14px; background: #12121a; border-radius: 8px;
    margin-bottom: 8px;
  }
  .highlight-item .hl-score {
    min-width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
    background: rgba(253,203,110,.15); color: var(--warn);
  }
  .highlight-item .hl-score.top { background: rgba(225,112,85,.15); color: var(--danger); }
  .highlight-item .hl-info { flex: 1; }
  .highlight-item .hl-time { font-size: 11px; color: var(--dim); }
  .highlight-item .hl-reason { font-size: 13px; margin-top: 2px; }

  /* Scene Analysis */
  .scene-item {
    border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 10px; overflow: hidden;
  }
  .scene-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; background: #12121a; cursor: pointer;
    font-size: 13px; font-weight: 600;
  }
  .scene-header:hover { background: #181825; }
  .scene-header .scene-time { font-size: 11px; color: var(--dim); }
  .scene-body { padding: 14px; font-size: 13px; line-height: 1.6; display: none; }
  .scene-body.open { display: block; }
  .scene-body .scene-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 8px; }
  .scene-body .scene-label:first-child { margin-top: 0; }

  /* Frame Descriptions */
  .frame-grid { display: grid; grid-template-columns: 1fr; gap: 6px; }
  .frame-item {
    display: flex; gap: 10px; align-items: baseline;
    padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,.04);
    font-size: 13px;
  }
  .frame-item .ft { min-width: 52px; color: var(--accent); font-weight: 600; font-size: 12px; }
  .frame-item .fd { color: var(--dim); }

  /* Quality Issues */
  .issue-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; font-size: 12px;
    background: rgba(225,112,85,.08); border-radius: 6px;
    margin-bottom: 4px;
  }
  .issue-severity {
    font-size: 10px; padding: 2px 6px; border-radius: 4px;
    text-transform: uppercase; font-weight: 600;
  }
  .issue-severity.high { background: rgba(225,112,85,.3); color: var(--danger); }
  .issue-severity.medium { background: rgba(253,203,110,.3); color: var(--warn); }
  .issue-severity.low { background: rgba(108,92,231,.3); color: var(--accent); }

  /* Mood Curve */
  .mood-curve { margin-bottom: 18px; }
  .mood-points { display: flex; gap: 4px; flex-wrap: wrap; }
  .mood-point {
    font-size: 10px; padding: 3px 8px; border-radius: 4px;
    background: #12121a; color: var(--dim);
  }
  .mood-point .mp-time { color: var(--accent); font-weight: 600; }

  /* Collapsible section */
  .section-toggle {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; cursor: pointer; user-select: none;
    font-size: 13px; font-weight: 600; color: var(--dim);
    border-bottom: 1px solid var(--border); margin-bottom: 12px;
  }
  .section-toggle:hover { color: var(--text); }
  .section-toggle .arrow { transition: transform .2s; }
  .section-toggle.open .arrow { transform: rotate(90deg); }

  /* Result Score */
  .result-score {
    font-size: 48px; font-weight: 700; text-align: center;
    color: var(--success); margin: 16px 0;
  }
  .result-score.fail { color: var(--danger); }
  .issues { list-style: none; }
  .issues li {
    padding: 6px 10px; font-size: 13px; color: var(--danger);
    background: rgba(225,112,85,.1); border-radius: 6px; margin-bottom: 6px;
  }
  .download-link {
    display: block; text-align: center; padding: 12px;
    background: var(--success); color: #000; border-radius: 8px;
    font-weight: 600; text-decoration: none; margin-top: 12px;
  }

  /* Security notice */
  .security {
    font-size: 11px; color: var(--dim); text-align: center; margin-top: 8px;
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }

  .hidden { display: none !important; }

  .error-msg {
    padding: 10px 14px; background: rgba(225,112,85,.1);
    border: 1px solid rgba(225,112,85,.3); border-radius: 8px;
    color: var(--danger); font-size: 13px; margin-top: 12px;
  }

  .no-data { color: var(--dim); font-size: 13px; font-style: italic; text-align: center; padding: 16px; }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>🎬 <span>AutoCut</span> Agent</h1>
    <p>深度内容分析 + 智能视频剪辑 — 音频与画面并重</p>
  </div>

  <!-- API Key -->
  <div class="card" id="key-card">
    <div class="card-title">
      <span class="icon">🔑</span> API 配置
      <span class="badge" id="save-badge" style="display:none">已保存</span>
    </div>
    <div class="field">
      <label>LLM 提供商</label>
      <select id="llm-provider">
        <option value="deepseek">DeepSeek（推荐，性价比高）</option>
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic Claude</option>
      </select>
    </div>
    <div class="row">
      <div class="field">
        <label>API Key <span id="key-saved" style="display:none;color:var(--success);font-size:10px">✅ 已保存</span></label>
        <div class="pw-wrap">
          <input id="api-key" type="password" placeholder="sk-..." autocomplete="off">
          <button class="toggle" onclick="togglePw('api-key')" title="显示/隐藏">👁</button>
        </div>
      </div>
      <div class="field">
        <label>Base URL（可选）</label>
        <input id="api-base" type="text" placeholder="https://api.deepseek.com/v1">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>视觉分析提供商（用于画面理解）</label>
        <select id="vision-provider">
          <option value="zhipu">智谱AI GLM-4V（国产推荐）</option>
          <option value="qwen">阿里百炼 Qwen-VL</option>
          <option value="openai">OpenAI GPT-4o</option>
        </select>
      </div>
      <div class="field">
        <label>视觉分析 Key <span id="vis-saved" style="display:none;color:var(--success);font-size:10px">✅ 已保存</span></label>
        <div class="pw-wrap">
          <input id="vision-key" type="password" placeholder="智谱/千问/OpenAI Key..." autocomplete="off">
          <button class="toggle" onclick="togglePw('vision-key')" title="显示/隐藏">👁</button>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn" style="flex:1;background:#2a2a3a;margin-top:0;font-size:13px;padding:10px" id="test-btn" onclick="testApiKey()">🔍 测试连接</button>
      <button class="btn" style="flex:1;background:#2a2a3a;margin-top:0;font-size:13px;padding:10px" id="save-btn" onclick="saveConfig()" disabled>💾 保存配置</button>
    </div>
    <div id="test-status" style="margin-top:8px;font-size:12px;text-align:center;min-height:18px"></div>
    <div class="security">🔒 先点「测试连接」验证 Key 可用后，才能保存和使用。Key 仅保存在本地 .env 文件。</div>
  </div>

  <!-- Upload -->
  <div class="card">
    <div class="card-title"><span class="icon">📹</span> 上传视频</div>
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
      <div class="icon">📁</div>
      <p>点击选择视频文件，或拖拽到此处</p>
      <p style="font-size:11px;margin-top:4px">支持 MP4 / MOV / AVI / MKV，建议不超过 500MB</p>
      <div class="file-name" id="file-name"></div>
    </div>
    <input type="file" id="file-input" accept="video/*" onchange="onFileSelect(event)">
  </div>

  <!-- Requirements -->
  <div class="card">
    <div class="card-title"><span class="icon">✏️</span> 剪辑需求</div>
    <div class="field">
      <textarea id="requirement" placeholder="例如：把这段30分钟的采访剪成3分钟的精华版，竖屏9:16，加中文字幕，去掉所有的静音和口误片段"></textarea>
    </div>
    <div class="presets">
      <span class="preset" onclick="setRequirement('剪成3分钟精华版，去掉所有静音段和口误，加中文字幕')">3分钟精华版</span>
      <span class="preset" onclick="setRequirement('剪成1分钟快节奏短视频，竖屏9:16，保留最精彩的画面')">1分钟短视频</span>
      <span class="preset" onclick="setRequirement('剪成5分钟教程版，保留完整的技术内容，去掉废话和停顿')">5分钟教程版</span>
      <span class="preset" onclick="setRequirement('只去掉静音和口误，保留全部有效内容，不做精简')">去静音口误</span>
      <span class="preset" onclick="setRequirement('分析这个视频的内容，告诉我里面讲了什么')">🔍 仅分析内容</span>
    </div>
    <div class="row" style="margin-top:12px">
      <div class="field">
        <label>目标时长（秒，可选）</label>
        <input id="target-duration" type="number" placeholder="如 180">
      </div>
      <div class="field">
        <label>目标画幅（可选）</label>
        <select id="target-aspect">
          <option value="">保持原画幅</option>
          <option value="16:9">横屏 16:9</option>
          <option value="9:16">竖屏 9:16</option>
          <option value="1:1">方形 1:1</option>
          <option value="4:3">4:3</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Submit -->
  <button class="btn" id="submit-btn" onclick="startTask()">🚀 开始分析 & 剪辑</button>

  <!-- Progress -->
  <div class="card hidden" id="progress-card">
    <div class="card-title"><span class="icon">⏳</span> 处理进度</div>
    <div class="progress-steps">
      <div class="step" id="step-director"></div>
      <div class="step" id="step-analyzer"></div>
      <div class="step" id="step-editor"></div>
      <div class="step" id="step-reviewer"></div>
    </div>
    <div class="status-line">
      <span class="status" id="status-text">初始化...</span>
      <span class="round" id="round-text"></span>
    </div>
    <div id="error-msg" class="error-msg hidden"></div>
  </div>

  <!-- Analysis Result -->
  <div class="card hidden" id="analysis-card">
    <div class="card-title"><span class="icon">🔍</span> 视频内容分析</div>
    <div id="analysis-content"></div>
  </div>

  <!-- Edit Result -->
  <div class="card hidden" id="result-card">
    <div class="card-title"><span class="icon">📊</span> 剪辑结果</div>
    <div class="result-score" id="result-score">--</div>
    <ul class="issues" id="result-issues"></ul>
    <a class="download-link" id="download-link" href="#" target="_blank">⬇ 下载成品视频</a>
  </div>

</div>

<script>
// ═══════════════════════════════════════════
// State
// ═══════════════════════════════════════════
let videoPath = '';
let taskId = '';
let pollTimer = null;
let savedConfig = {};     // 从 .env 加载的已保存配置
let apiKeyVerified = false; // Key 是否已验证

const STEPS = ['director', 'analyzer', 'editor', 'reviewer'];

// ═══════════════════════════════════════════
// Config: 测试 API Key 是否可用
// ═══════════════════════════════════════════
async function testApiKey() {
  const provider = document.getElementById('llm-provider').value;
  const apiKey = document.getElementById('api-key').value.trim();
  const apiBase = document.getElementById('api-base').value.trim();
  const visProvider = document.getElementById('vision-provider').value;
  const visKey = document.getElementById('vision-key').value.trim();

  // 如果有已保存的 key 且用户没填新 key，使用占位提示
  const hasSaved = document.getElementById('key-saved').style.display !== 'none';
  if (!apiKey && !hasSaved) {
    showTestStatus('error', '请先填写 API Key');
    return;
  }

  const btn = document.getElementById('test-btn');
  const statusEl = document.getElementById('test-status');
  btn.disabled = true;
  btn.textContent = '⏳ 测试中...';
  showTestStatus('testing', '正在验证连接...');

  // 构建测试请求
  const payload = { llm_provider: provider };
  if (apiKey && !apiKey.includes('*')) {
    if (provider === 'deepseek') { payload.deepseek_api_key = apiKey; payload.deepseek_base_url = apiBase; }
    else if (provider === 'openai') { payload.openai_api_key = apiKey; payload.openai_base_url = apiBase; }
  }

  try {
    const resp = await fetch('/api/config/test', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    const data = await resp.json();

    if (resp.ok && data.success) {
      apiKeyVerified = true;
      showTestStatus('success', data.message);
      document.getElementById('save-btn').disabled = false;
      document.getElementById('submit-btn').disabled = false;
    } else {
      apiKeyVerified = false;
      showTestStatus('error', data.error || data.detail || '验证失败');
      document.getElementById('save-btn').disabled = true;
    }
  } catch (e) {
    apiKeyVerified = false;
    showTestStatus('error', `网络错误: ${e.message}`);
    document.getElementById('save-btn').disabled = true;
  }

  btn.disabled = false;
  btn.textContent = '🔍 测试连接';
}

function showTestStatus(type, msg) {
  const el = document.getElementById('test-status');
  const colors = { success: 'var(--success)', error: 'var(--danger)', testing: 'var(--warn)', info: 'var(--dim)' };
  el.style.color = colors[type] || colors.info;
  el.textContent = msg;
}

// ═══════════════════════════════════════════
// Config: 自动加载已保存的配置
// ═══════════════════════════════════════════
async function loadSavedConfig() {
  try {
    const resp = await fetch('/api/config');
    const data = await resp.json();
    if (!data.success || !data.config) return;
    savedConfig = data.config;

    // LLM 提供商
    const provider = savedConfig.llm_provider || '';
    if (provider) {
      document.getElementById('llm-provider').value = provider;
    }

    // 根据提供商填入对应的 Key 和 Base URL
    updateKeyFieldsForProvider(provider);

    // Base URL
    const baseUrlMap = {
      deepseek: savedConfig.deepseek_base_url,
      openai: savedConfig.openai_base_url,
    };
    if (baseUrlMap[provider]) {
      document.getElementById('api-base').value = baseUrlMap[provider];
    }

    // 视觉提供商
    const visProvider = savedConfig.vision_provider || 'zhipu';
    document.getElementById('vision-provider').value = visProvider;

    // 视觉 Key（根据视觉提供商填入）
    const visKeyMap = {
      zhipu: savedConfig.zhipu_api_key,
      qwen: savedConfig.qwen_api_key,
      openai: savedConfig.openai_api_key,
    };
    if (visKeyMap[visProvider] && visKeyMap[visProvider].includes('*')) {
      // 有已保存的 key（masked），显示占位提示
      document.getElementById('vision-key').placeholder = `已保存 (${visKeyMap[visProvider]})`;
      document.getElementById('vis-saved').style.display = 'inline';
    }

    // 总保存状态
    const hasMainKey = getMainApiKey() && getMainApiKey().includes('*');
    if (hasMainKey || document.getElementById('vis-saved').style.display !== 'none') {
      document.getElementById('save-badge').style.display = 'inline';
      // 已有保存的 key，标记为已验证（用户可选择重新测试）
      apiKeyVerified = true;
      document.getElementById('save-btn').disabled = false;
      showTestStatus('success', '✅ 检测到已保存的 Key，可直接使用');
    }
  } catch (e) {
    console.log('加载配置失败（首次使用正常）:', e.message);
  }
}

function updateKeyFieldsForProvider(provider) {
  const keyMap = {
    deepseek: savedConfig.deepseek_api_key,
    openai: savedConfig.openai_api_key,
    anthropic: '',
  };
  const baseMap = {
    deepseek: savedConfig.deepseek_base_url || '',
    openai: savedConfig.openai_base_url || '',
    anthropic: '',
  };

  const maskedKey = keyMap[provider] || '';
  if (maskedKey && maskedKey.includes('*')) {
    document.getElementById('api-key').placeholder = `已保存 (${maskedKey})`;
    document.getElementById('key-saved').style.display = 'inline';
  } else {
    document.getElementById('api-key').placeholder = 'sk-...';
    document.getElementById('key-saved').style.display = 'none';
  }

  if (baseMap[provider]) {
    document.getElementById('api-base').value = baseMap[provider];
  }
}

// ═══════════════════════════════════════════
// Config: 保存配置到 .env
// ═══════════════════════════════════════════
async function saveConfig() {
  const provider = document.getElementById('llm-provider').value;
  const apiKey = document.getElementById('api-key').value.trim();
  const apiBase = document.getElementById('api-base').value.trim();
  const visProvider = document.getElementById('vision-provider').value;
  const visKey = document.getElementById('vision-key').value.trim();

  // 构建要保存的字段
  const payload = {
    llm_provider: provider,
  };

  // 主 LLM Key（根据提供商映射到正确的字段）
  if (apiKey && !apiKey.includes('*')) {
    if (provider === 'deepseek') {
      payload.deepseek_api_key = apiKey;
    } else if (provider === 'openai') {
      payload.openai_api_key = apiKey;
    }
  }
  if (apiBase) {
    if (provider === 'deepseek') {
      payload.deepseek_base_url = apiBase;
    } else if (provider === 'openai') {
      payload.openai_base_url = apiBase;
    }
  }

  // 视觉提供商
  payload.vision_provider = visProvider;

  // 视觉 Key
  if (visKey && !visKey.includes('*')) {
    if (visProvider === 'zhipu') {
      payload.zhipu_api_key = visKey;
    } else if (visProvider === 'qwen') {
      payload.qwen_api_key = visKey;
    } else {
      payload.openai_api_key = visKey;
    }
  }

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = '⏳ 保存中...';

  try {
    const resp = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!resp.ok) {
      let errMsg = `HTTP ${resp.status}`;
      try { const e = await resp.json(); errMsg = e.detail || errMsg; } catch (_) {}
      btn.textContent = `❌ ${errMsg}`;
      console.error('保存失败:', errMsg);
      setTimeout(() => { btn.disabled = false; btn.textContent = '💾 保存配置到本地'; }, 3000);
      return;
    }

    const data = await resp.json();

    if (data.success) {
      btn.textContent = '✅ 已保存';
      document.getElementById('save-badge').style.display = 'inline';
      // 更新 placeholder 显示已保存状态
      if (apiKey) {
        document.getElementById('api-key').value = '';
        document.getElementById('api-key').placeholder = `已保存 (****${apiKey.slice(-4)})`;
        document.getElementById('key-saved').style.display = 'inline';
      }
      if (visKey) {
        document.getElementById('vision-key').value = '';
        document.getElementById('vision-key').placeholder = `已保存 (****${visKey.slice(-4)})`;
        document.getElementById('vis-saved').style.display = 'inline';
      }
      // 刷新 savedConfig
      await loadSavedConfig();
    } else {
      btn.textContent = `⚠️ ${data.message || '保存失败'}`;
    }
  } catch (e) {
    btn.textContent = `❌ ${e.message}`;
    console.error('保存配置失败:', e);
  }

  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = '💾 保存配置到本地';
  }, 2000);
}

// 获取当前主 LLM 的已保存 Key（masked）
function getMainApiKey() {
  const provider = document.getElementById('llm-provider').value;
  if (provider === 'deepseek') return savedConfig.deepseek_api_key || '';
  if (provider === 'openai') return savedConfig.openai_api_key || '';
  return '';
}

// ═══════════════════════════════════════════
// Upload
// ═══════════════════════════════════════════
const uploadZone = document.getElementById('upload-zone');

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

function onFileSelect(e) {
  const file = e.target.files[0];
  if (file) handleFile(file);
}

async function handleFile(file) {
  if (file.size > 2 * 1024 * 1024 * 1024) {
    document.getElementById('file-name').textContent = `❌ 文件超过 2GB，请压缩后重试`;
    return;
  }

  document.getElementById('file-name').textContent = `⏳ 正在上传: ${file.name} (${(file.size/1024/1024).toFixed(1)} MB)`;

  const form = new FormData();
  form.append('file', file);

  try {
    const resp = await fetch('/api/upload', { method: 'POST', body: form });
    if (!resp.ok) {
      let errMsg = `HTTP ${resp.status}`;
      try { const errData = await resp.json(); errMsg = errData.detail || errMsg; } catch (_) {}
      document.getElementById('file-name').textContent = `❌ ${errMsg}`;
      return;
    }
    const data = await resp.json();
    if (data.success) {
      videoPath = data.video_path;
      document.getElementById('file-name').textContent = `✅ ${file.name} (${(file.size/1024/1024).toFixed(1)} MB) — 上传成功`;
    } else {
      document.getElementById('file-name').textContent = `❌ ${data.error || data.detail || '上传失败'}`;
    }
  } catch (e) {
    document.getElementById('file-name').textContent = `❌ 网络错误: ${e.message}（请确认服务已启动，端口 8000）`;
  }
}

// ═══════════════════════════════════════════
// Start task
// ═══════════════════════════════════════════
async function startTask() {
  if (!apiKeyVerified) { alert('请先点击「测试连接」验证 API Key 可用'); return; }

  const requirement = document.getElementById('requirement').value.trim();
  if (!requirement) { alert('请填写剪辑需求'); return; }

  if (!videoPath) { alert('请先上传视频文件'); return; }

  const provider = document.getElementById('llm-provider').value;
  const apiBase = document.getElementById('api-base').value.trim();
  const visionKey = document.getElementById('vision-key').value.trim();
  const visionProvider = document.getElementById('vision-provider').value;
  const targetDuration = document.getElementById('target-duration').value;
  const targetAspect = document.getElementById('target-aspect').value;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '⏳ 提交中...';

  try {
    const resp = await fetch('/api/tasks/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        video_path: videoPath,
        user_requirement: requirement,
        target_duration: targetDuration ? parseFloat(targetDuration) : null,
        target_aspect_ratio: targetAspect || null,
        llm_provider: provider,
        api_key: apiKey,
        api_base: apiBase,
        vision_key: visionKey,
        vision_provider: visionProvider,
      }),
    });
    const data = await resp.json();

    if (resp.ok) {
      taskId = data.task_id;
      document.getElementById('progress-card').classList.remove('hidden');
      document.getElementById('analysis-card').classList.add('hidden');
      document.getElementById('result-card').classList.add('hidden');
      document.getElementById('error-msg').classList.add('hidden');
      STEPS.forEach(s => { document.getElementById(`step-${s}`).className = 'step'; });
      btn.textContent = '🔄 处理中...';
      startPolling();
    } else {
      alert(`创建任务失败: ${data.detail || '未知错误'}`);
      btn.disabled = false;
      btn.textContent = '🚀 开始分析 & 剪辑';
    }
  } catch (e) {
    alert(`请求失败: ${e.message}`);
    btn.disabled = false;
    btn.textContent = '🚀 开始分析 & 剪辑';
  }
}

// ═══════════════════════════════════════════
// Poll status
// ═══════════════════════════════════════════
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try {
      const resp = await fetch(`/api/tasks/${taskId}`);
      if (!resp.ok) return;
      const data = await resp.json();

      updateProgress(data);

      if (data.status === 'done') {
        stopPolling();
        showResult();
      } else if (data.status === 'failed') {
        stopPolling();
        document.getElementById('error-msg').textContent = data.error || '未知错误';
        document.getElementById('error-msg').classList.remove('hidden');
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('submit-btn').textContent = '🚀 重试';
      }
    } catch (e) { /* ignore polling errors */ }
  }, 2000);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

function updateProgress(data) {
  document.getElementById('status-text').textContent = data.progress;
  document.getElementById('round-text').textContent =
    data.review_round > 0 ? `审核第 ${data.review_round} 轮` : '';

  const currentPhase = data.progress.includes('director') ? 'director'
    : data.progress.includes('analyzer') ? 'analyzer'
    : data.progress.includes('editor') ? 'editor'
    : data.progress.includes('reviewer') ? 'reviewer'
    : null;

  STEPS.forEach(s => {
    const el = document.getElementById(`step-${s}`);
    const idx = STEPS.indexOf(s);
    const currentIdx = currentPhase ? STEPS.indexOf(currentPhase) : -1;

    if (data.status === 'done') el.className = 'step done';
    else if (idx < currentIdx && currentIdx >= 0) el.className = 'step done';
    else if (idx === currentIdx) el.className = 'step active';
    else el.className = 'step';
  });
}

// ═══════════════════════════════════════════
// Show results (analysis + edit)
// ═══════════════════════════════════════════
async function showResult() {
  try {
    const resp = await fetch(`/api/tasks/${taskId}/result`);
    const data = await resp.json();

    // ── Analysis Card ──
    if (data.analysis && data.analysis.content_summary) {
      renderAnalysis(data.analysis);
    }

    // ── Edit Result Card ──
    const card = document.getElementById('result-card');
    card.classList.remove('hidden');

    const score = data.review_score || 0;
    const scoreEl = document.getElementById('result-score');
    scoreEl.textContent = `${score}/100`;
    scoreEl.className = 'result-score' + (score < 70 ? ' fail' : '');

    const issuesEl = document.getElementById('result-issues');
    issuesEl.innerHTML = (data.review_issues || []).map(i => `<li>${i}</li>`).join('');

    const dl = document.getElementById('download-link');
    dl.href = `/api/tasks/${taskId}/download`;

    document.getElementById('submit-btn').disabled = false;
    document.getElementById('submit-btn').textContent = '🚀 再来一次';
  } catch (e) {
    console.error('获取结果失败:', e);
  }
}

// ═══════════════════════════════════════════
// Render analysis panel
// ═══════════════════════════════════════════
function renderAnalysis(a) {
  const card = document.getElementById('analysis-card');
  card.classList.remove('hidden');

  let html = '';

  // Stats row
  html += `<div class="analysis-stats">
    <div class="stat-item"><div class="stat-num">${a.transcript_segments || 0}</div><div class="stat-label">语音段落</div></div>
    <div class="stat-item"><div class="stat-num">${a.scenes_count || 0}</div><div class="stat-label">场景切分</div></div>
    <div class="stat-item"><div class="stat-num">${a.energy_peaks || 0}</div><div class="stat-label">能量峰值</div></div>
    <div class="stat-item"><div class="stat-num">${(a.frame_descriptions || []).length}</div><div class="stat-label">画面描述</div></div>
  </div>`;

  // Content Summary
  if (a.content_summary) {
    html += `<div class="summary-block">
      <div class="label">📝 内容摘要</div>
      ${escHtml(a.content_summary)}
    </div>`;
  }

  // Tags + Mood
  if ((a.content_tags || []).length > 0 || a.mood) {
    html += `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px">`;
    if ((a.content_tags || []).length > 0) {
      html += `<div class="tag-list" style="margin-bottom:0">${a.content_tags.map(t => `<span class="tag">${escHtml(t)}</span>`).join('')}</div>`;
    }
    if (a.mood) {
      html += `<span class="mood-badge" style="margin-bottom:0">🎭 ${escHtml(a.mood)}</span>`;
    }
    html += `</div>`;
  }

  // Narrative Structure
  if (a.narrative_structure && Object.keys(a.narrative_structure).length > 0) {
    html += renderNarrative(a.narrative_structure);
  }

  // Mood Curve
  if ((a.mood_curve || []).length > 0) {
    html += `<div class="mood-curve">
      <div class="section-toggle" onclick="toggleSection(this)"><span>📈 情绪曲线</span><span class="arrow">▶</span></div>
      <div class="mood-points" style="display:none">${a.mood_curve.map(m =>
        `<span class="mood-point"><span class="mp-time">${fmtTime(m.time)}</span> ${escHtml(m.mood || '')}</span>`
      ).join('')}</div>
    </div>`;
  }

  // Highlights
  if ((a.highlights || []).length > 0) {
    html += `<div class="section-toggle open" onclick="toggleSection(this)"><span>⭐ 精彩片段 (${a.highlights.length})</span><span class="arrow">▶</span></div>`;
    html += `<div>${a.highlights.map(h => `
      <div class="highlight-item">
        <div class="hl-score${h.score >= 8 ? ' top' : ''}">${h.score || '?'}</div>
        <div class="hl-info">
          <div class="hl-time">${fmtRange(h.start, h.end)}</div>
          <div class="hl-reason">${escHtml(h.reason || '')}</div>
        </div>
      </div>`).join('')}</div>`;
  }

  // Quality Issues
  if ((a.quality_issues || []).length > 0) {
    html += `<div class="section-toggle" onclick="toggleSection(this)" style="margin-top:12px"><span>⚠️ 质量问题 (${a.quality_issues.length})</span><span class="arrow">▶</span></div>`;
    html += `<div style="display:none">${a.quality_issues.map(q => `
      <div class="issue-item">
        <span class="issue-severity ${q.severity || 'low'}">${q.severity || 'low'}</span>
        <span>${fmtRange(q.start, q.end)}</span>
        <span style="color:var(--dim)">${escHtml(q.detail || q.issue_type || '')}</span>
      </div>`).join('')}</div>`;
  }

  // Scene Analyses
  if ((a.scene_analyses || []).length > 0) {
    html += `<div class="section-toggle open" onclick="toggleSection(this)" style="margin-top:12px"><span>🎬 场景分析 (${a.scene_analyses.length})</span><span class="arrow">▶</span></div>`;
    html += `<div>${a.scene_analyses.map((s, i) => `
      <div class="scene-item">
        <div class="scene-header" onclick="this.nextElementSibling.classList.toggle('open')">
          <span>场景 ${s.scene || i+1}</span>
          <span class="scene-time">${fmtRange(s.start, s.end)}</span>
        </div>
        <div class="scene-body">
          ${s.visual ? `<div class="scene-label">🖼️ 画面</div><div>${escHtml(s.visual)}</div>` : ''}
          ${s.audio ? `<div class="scene-label">🎤 音频</div><div>${escHtml(s.audio)}</div>` : ''}
          ${s.summary ? `<div class="scene-label">📋 综合</div><div>${escHtml(s.summary)}</div>` : ''}
        </div>
      </div>`).join('')}</div>`;
  }

  // Frame Descriptions
  if ((a.frame_descriptions || []).length > 0) {
    html += `<div class="section-toggle" onclick="toggleSection(this)" style="margin-top:12px"><span>🖼️ 关键帧画面描述 (${a.frame_descriptions.length})</span><span class="arrow">▶</span></div>`;
    html += `<div class="frame-grid" style="display:none">${a.frame_descriptions.map(f => `
      <div class="frame-item">
        <span class="ft">${fmtTime(f.time_seconds)}</span>
        <span class="fd">${escHtml(f.description || '')}</span>
      </div>`).join('')}</div>`;
  }

  if (!html) {
    html = `<div class="no-data">分析数据为空</div>`;
  }

  document.getElementById('analysis-content').innerHTML = html;
}

// ═══════════════════════════════════════════
// Render narrative structure bar
// ═══════════════════════════════════════════
function renderNarrative(n) {
  const colors = {
    intro: 'narr-intro', body: 'narr-body', climax: 'narr-climax',
    outro: 'narr-outro', opening: 'narr-intro', ending: 'narr-outro',
    hook: 'narr-climax',
  };
  const parts = [];
  let maxEnd = 0;
  for (const [key, val] of Object.entries(n)) {
    if (val && typeof val === 'object' && val.start !== undefined && val.end !== undefined) {
      parts.push({ key, ...val });
      maxEnd = Math.max(maxEnd, val.end || 0);
    }
  }
  if (parts.length === 0) return '';

  const total = maxEnd || 1;

  let html = `<div class="narrative"><h4>📐 叙事结构</h4>`;
  html += `<div class="narr-bar">`;
  for (const p of parts) {
    const pct = Math.max(2, ((p.end - p.start) / total) * 100);
    html += `<div class="narr-seg ${colors[p.key] || 'narr-other'}" style="width:${pct}%" title="${p.key}: ${fmtRange(p.start, p.end)}">${p.key}</div>`;
  }
  html += `</div>`;
  html += `<div class="narr-legend">${parts.map(p =>
    `<span><span class="dot ${colors[p.key] || 'narr-other'}"></span>${p.key}: ${p.description || fmtRange(p.start, p.end)}</span>`
  ).join('')}</div>`;
  html += `</div>`;
  return html;
}

// ═══════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════
function fmtTime(s) {
  if (s == null) return '--:--';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2, '0')}`;
}

function fmtRange(start, end) {
  return `${fmtTime(start)} – ${fmtTime(end)}`;
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function toggleSection(el) {
  el.classList.toggle('open');
  const next = el.nextElementSibling;
  if (next) next.style.display = next.style.display === 'none' ? '' : 'none';
}
